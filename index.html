<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ration Tracker Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
    background: #f2f2f7;
}

.container { max-width: 900px; margin: auto; padding: 15px; }

/* TOP INPUT */
.top {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    background: white;
    padding: 10px;
    border-radius: 14px;
}

.top input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.top button {
    padding: 10px 12px;
    border: none;
    border-radius: 10px;
    background: #007aff;
    color: white;
}

/* SEARCH */
.search {
    margin-top: 10px;
}

.search input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* LIST */
.list {
    margin-top: 10px;
    background: white;
    border-radius: 14px;
    padding: 10px;
}

/* CATEGORY HEADER */
.category {
    margin-top: 10px;
    padding: 10px;
    background: #f0f0f5;
    border-radius: 10px;
    font-weight: 600;
    color: #007aff;
    cursor: pointer;
}

/* ITEM */
.item {
    display: flex;
    justify-content: space-between;
    padding: 10px 15px;
    border-bottom: 1px solid #eee;
}

.left { flex: 2; }

.value input {
    width: 80px;
    text-align: right;
}

/* COLLAPSED */
.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<!-- INPUT -->
<div class="top">
    <input id="name" placeholder="Item name" list="nameList">
    <input id="category" placeholder="Category" list="catList">
    <button onclick="addItem()">Add</button>
</div>

<!-- AUTOCOMPLETE -->
<datalist id="nameList"></datalist>
<datalist id="catList"></datalist>

<!-- SEARCH -->
<div class="search">
    <input id="search" placeholder="Search..." oninput="render()">
</div>

<div class="list" id="list"></div>

</div>

<script>

let m = new Date().getMonth();
let y = new Date().getFullYear();

const masterKey = "ration_master_v3";

function getKey(){ return `ration_${y}_${m}`; }

function loadMaster(){
    return JSON.parse(localStorage.getItem(masterKey) || "[]");
}

function saveMaster(d){
    localStorage.setItem(masterKey, JSON.stringify(d));
}

function loadMonth(){
    return JSON.parse(localStorage.getItem(getKey()) || "{}");
}

function saveMonth(d){
    localStorage.setItem(getKey(), JSON.stringify(d));
}

/* AUTO SUGGEST */
function updateSuggestions(){
    let master = loadMaster();

    let names = [...new Set(master.map(i => i.name))];
    let cats = [...new Set(master.map(i => i.category))];

    document.getElementById("nameList").innerHTML =
        names.map(n => `<option value="${n}">`).join("");

    document.getElementById("catList").innerHTML =
        cats.map(c => `<option value="${c}">`).join("");
}

/* ADD ITEM */
function addItem(){
    let name = document.getElementById("name").value.trim();
    let cat = document.getElementById("category").value.trim() || "General";

    if(!name) return;

    let master = loadMaster();

    if(!master.find(i => i.name === name)){
        master.push({name, category: cat});
        saveMaster(master);
    }

    let month = loadMonth();
    if(month[name] === undefined) month[name] = 0;
    saveMonth(month);

    document.getElementById("name").value = "";
    document.getElementById("category").value = "";

    updateSuggestions();
    render();
}

/* UPDATE VALUE */
function updateValue(name, val){
    let month = loadMonth();
    month[name] = Number(val) || 0;
    saveMonth(month);
}

/* DELETE */
function deleteItem(name){
    let master = loadMaster().filter(i => i.name !== name);
    saveMaster(master);

    let month = loadMonth();
    delete month[name];
    saveMonth(month);

    render();
}

/* TOGGLE CATEGORY */
function toggle(cat){
    let el = document.querySelectorAll(`[data-cat="${cat}"]`);
    el.forEach(e => e.classList.toggle("hidden"));
}

/* RENDER */
function render(){

    let list = document.getElementById("list");
    let search = document.getElementById("search").value.toLowerCase();

    list.innerHTML = "";

    let master = loadMaster();
    let month = loadMonth();

    let filtered = master.filter(i =>
        i.name.toLowerCase().includes(search) ||
        i.category.toLowerCase().includes(search)
    );

    let grouped = {};
    filtered.forEach(i => {
        if(!grouped[i.category]) grouped[i.category] = [];
        grouped[i.category].push(i);
    });

    Object.keys(grouped).sort().forEach(cat => {

        let catDiv = document.createElement("div");
        catDiv.className = "category";
        catDiv.innerText = "📦 " + cat;
        catDiv.onclick = () => toggle(cat);
        list.appendChild(catDiv);

        grouped[cat].forEach(i => {

            let div = document.createElement("div");
            div.className = "item";
            div.setAttribute("data-cat", cat);

            div.innerHTML = `
                <div class="left">${i.name}</div>

                <div class="value">
                    <input type="number"
                    value="${month[i.name] || 0}"
                    onchange="updateValue('${i.name}',this.value)">
                </div>

                <button onclick="deleteItem('${i.name}')">X</button>
            `;

            list.appendChild(div);
        });
    });

    updateSuggestions();
}

/* PWA */
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
}

updateSuggestions();
render();

</script>

</body>
</html>
