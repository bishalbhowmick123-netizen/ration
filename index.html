<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ration Tracker</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- PWA MANIFEST -->
<link rel="manifest" href="manifest.json">
  
<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
    background: #f2f2f7;
}

.container { max-width: 900px; margin: auto; padding: 15px; }

/* TOP */
.top {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    background: white;
    padding: 10px;
    border-radius: 14px;
}

.top input, .top select {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    flex: 1;
}

.top button {
    padding: 10px 12px;
    border: none;
    border-radius: 10px;
    background: #007aff;
    color: white;
}

/* SEARCH */
.search {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

.search input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* MONTH */
.month {
    margin-top: 10px;
    background: white;
    padding: 10px;
    border-radius: 14px;
    display: flex;
    justify-content: space-between;
}

/* LIST */
.list {
    margin-top: 10px;
    background: white;
    border-radius: 14px;
    padding: 10px;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    border-bottom: 1px solid #eee;
    position: relative;
}

.item:last-child { border: none; }

.left {
    flex: 2;
}

.cat {
    font-size: 12px;
    color: gray;
}

.value input {
    width: 80px;
    text-align: right;
}

.actions {
    display: none;
    gap: 6px;
}

.item:hover .actions {
    display: flex;
}

.actions button {
    border: none;
    padding: 5px 8px;
    border-radius: 8px;
    font-size: 12px;
}

.del { background: #ff3b30; color: white; }

.total {
    margin-top: 10px;
    background: white;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<!-- INPUT -->
<div class="top">
    <input id="name" placeholder="Item name">
    <input id="category" placeholder="Category (e.g. Rice, Oil)">
    <button onclick="addItem()">Add</button>
</div>

<!-- SEARCH -->
<div class="search">
    <input id="search" placeholder="Search items..." oninput="render()">
</div>

<!-- MONTH -->
<div class="month">
    <button onclick="changeMonth(-1)">⬅</button>
    <div id="monthLabel"></div>
    <button onclick="changeMonth(1)">➡</button>
</div>

<!-- LIST -->
<div class="list" id="list"></div>

<!-- TOTAL -->
<div class="total">
Total: ₹ <span id="total">0</span>
</div>

</div>

<script>
let now = new Date();
let m = now.getMonth();
let y = now.getFullYear();

const masterKey = "ration_master_v2";

function getKey(){ return `ration_${y}_${m}`; }

function loadMaster(){
    return JSON.parse(localStorage.getItem(masterKey) || "[]");
}
function saveMaster(d){ localStorage.setItem(masterKey, JSON.stringify(d)); }

function loadMonth(){
    return JSON.parse(localStorage.getItem(getKey()) || "{}");
}
function saveMonth(d){ localStorage.setItem(getKey(), JSON.stringify(d)); }

function addItem(){
    let name = document.getElementById("name").value.trim();
    let cat = document.getElementById("category").value.trim() || "General";

    if(!name) return;

    let master = loadMaster();

    if(!master.find(x => x.name === name)){
        master.push({name, category: cat});
        saveMaster(master);
    }

    let month = loadMonth();
    if(!month[name]) month[name] = 0;
    saveMonth(month);

    document.getElementById("name").value = "";
    document.getElementById("category").value = "";

    render();
}

function deleteItem(name){
    let master = loadMaster().filter(i => i.name !== name);
    saveMaster(master);

    let month = loadMonth();
    delete month[name];
    saveMonth(month);

    render();
}

function updateValue(name, val){
    let month = loadMonth();
    month[name] = Number(val) || 0;
    saveMonth(month);
    renderTotal();
}

function changeMonth(step){
    m += step;
    if(m < 0){ m = 11; y--; }
    if(m > 11){ m = 0; y++; }
    render();
}

function sync(){
    let master = loadMaster();
    let month = loadMonth();

    master.forEach(i=>{
        if(month[i.name] === undefined) month[i.name] = 0;
    });

    saveMonth(month);
}

function render(){
    sync();

    let list = document.getElementById("list");
    let search = document.getElementById("search").value.toLowerCase();

    list.innerHTML = "";

    let master = loadMaster();
    let month = loadMonth();

    master
    .filter(i =>
        i.name.toLowerCase().includes(search) ||
        i.category.toLowerCase().includes(search)
    )
    .forEach(i=>{
        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
        <div class="left">
            <div>${i.name}</div>
            <div class="cat">${i.category}</div>
        </div>

        <div class="value">
            <input type="number" value="${month[i.name] || 0}"
            onchange="updateValue('${i.name}',this.value)">
        </div>

        <div class="actions">
            <button class="del" onclick="deleteItem('${i.name}')">X</button>
        </div>
        `;

        list.appendChild(div);
    });

    renderTotal();
    updateLabel();
}

function renderTotal(){
    let mdata = loadMonth();
    let total = Object.values(mdata).reduce((a,b)=>a+Number(b||0),0);
    document.getElementById("total").innerText = total;
}

function updateLabel(){
    const names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    document.getElementById("monthLabel").innerText = `${names[m]} ${y}`;
}

/* ===== PWA SERVICE WORKER ===== */
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker Registered"));
}
  render();
</script>

</body>
</html>
